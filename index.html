<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MGC DataCite Repository</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --white:   #ffffff;
      --off:     #f5f5f4;
      --rule:    #d6d3d1;
      --rule-dk: #a8a29e;
      --ink:     #1c1917;
      --sub:     #57534e;
      --faint:   #78716c;
      --red:     #c0392b;
      --red-bg:  #fef2f2;
      --green:   #16653a;
      --green-bg:#f0fdf4;
      --blue:    #1d4ed8;
      --blue-bg: #eff6ff;
      --amber:   #92400e;
      --amber-bg:#fffbeb;
      --sans:    'Inter', system-ui, sans-serif;
      --mono:    'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--white);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Top bar ─────────────────────────────────── */
    .topbar {
      border-bottom: 2px solid var(--ink);
      padding: 0 2rem;
    }
    .topbar-inner {
      max-width: 1040px;
      margin: 0 auto;
      display: flex;
      align-items: stretch;
      gap: 0;
    }
    .topbar-brand {
      padding: 1rem 2rem 1rem 0;
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .brand-name {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .brand-sub {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--faint);
    }
    .topbar-stats {
      display: flex;
      align-items: stretch;
      flex: 1;
    }
    .tstat {
      padding: 0.9rem 1.8rem;
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.05rem;
    }
    .tstat:last-child { border-right: none; }
    .tstat-n {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .tstat-l {
      font-size: 0.67rem;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .topbar-links {
      padding: 0 0 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-left: auto;
    }
    .topbar-links a {
      font-size: 0.75rem;
      color: var(--sub);
      text-decoration: none;
      white-space: nowrap;
    }
    .topbar-links a:hover { color: var(--red); }

    /* ── Toolbar ─────────────────────────────────── */
    .toolbar {
      border-bottom: 1px solid var(--rule);
      padding: 0 2rem;
      background: var(--off);
    }
    .toolbar-inner {
      max-width: 1040px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      flex-wrap: wrap;
    }
    .tb-label {
      font-size: 0.7rem;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .tb-input {
      border: 1px solid var(--rule);
      background: var(--white);
      padding: 0.38rem 0.65rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--ink);
      outline: none;
      min-width: 220px;
    }
    .tb-input:focus { border-color: var(--ink); }
    .tb-select {
      border: 1px solid var(--rule);
      background: var(--white);
      padding: 0.38rem 0.65rem;
      font-family: var(--sans);
      font-size: 0.75rem;
      color: var(--ink);
      outline: none;
      cursor: pointer;
    }
    .tb-select:focus { border-color: var(--ink); }
    .tb-sep { width: 1px; height: 1.4rem; background: var(--rule); }
    .tb-sort-label {
      font-size: 0.7rem;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .sort-group { display: flex; gap: 0; }
    .sort-opt {
      border: 1px solid var(--rule);
      background: var(--white);
      padding: 0.38rem 0.7rem;
      font-size: 0.72rem;
      color: var(--sub);
      cursor: pointer;
      margin-left: -1px;
    }
    .sort-opt:first-child { margin-left: 0; }
    .sort-opt.active {
      background: var(--ink);
      color: var(--white);
      border-color: var(--ink);
      z-index: 1;
    }
    .sort-opt:hover:not(.active) { background: var(--off); }

    /* ── Main ────────────────────────────────────── */
    .main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }
    .list-meta {
      font-size: 0.72rem;
      color: var(--faint);
      padding: 0.75rem 0 0.5rem;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── DOI rows ────────────────────────────────── */
    .doi-row {
      border-bottom: 1px solid var(--rule);
    }
    .doi-row-main {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      padding: 0.9rem 0;
      cursor: pointer;
      align-items: start;
    }
    .doi-row-main:hover .doi-title { color: var(--red); }

    .doi-title {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.35;
      transition: color 0.12s;
      margin-bottom: 0.2rem;
    }
    .doi-creators {
      font-size: 0.75rem;
      color: var(--sub);
      margin-bottom: 0.3rem;
    }
    .doi-meta-line {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .doi-badge {
      font-family: var(--mono);
      font-size: 0.6rem;
      padding: 0.08rem 0.4rem;
      border: 1px solid var(--rule);
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-type  { border-color: #c7d2fe; color: var(--blue); background: #f0f4ff; }
    .badge-year  { border-color: var(--rule-dk); color: var(--sub); }
    .badge-schema { border-color: #bbf7d0; color: var(--green); background: var(--green-bg); }

    .doi-identifier {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--faint);
      margin-top: 0.3rem;
    }
    .doi-identifier a { color: var(--blue); text-decoration: none; }
    .doi-identifier a:hover { text-decoration: underline; }
    .doi-counts {
      font-size: 0.65rem;
      color: var(--faint);
      margin-top: 0.25rem;
      font-variant-numeric: tabular-nums;
    }
    .doi-counts span { margin-right: 0.9rem; }

    .toggle-btn {
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--faint);
      background: none;
      border: 1px solid var(--rule);
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: start;
      margin-top: 0.15rem;
    }
    .toggle-btn:hover { border-color: var(--red); color: var(--red); }
    .toggle-btn.open  { border-color: var(--ink); color: var(--ink); background: var(--ink); color: var(--white); }

    /* ── Activity panel ──────────────────────────── */
    .act-panel {
      display: none;
      background: var(--off);
      border-top: 1px solid var(--rule);
      padding: 1rem 0 1.25rem;
    }
    .act-panel.open { display: block; }

    .act-header {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--faint);
      margin-bottom: 0.85rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .act-header a {
      font-family: var(--mono);
      color: var(--blue);
      text-decoration: none;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.65rem;
    }
    .act-header a:hover { text-decoration: underline; }

    /* Pulse bar */
    .pulse-bar {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 32px;
      margin-bottom: 1.1rem;
    }
    .pulse-seg {
      flex: 1;
      min-width: 4px;
      opacity: 0.85;
    }

    /* Timeline table layout */
    .tl-table {
      width: 100%;
      border-collapse: collapse;
    }
    .tl-table td {
      padding: 0.45rem 0.75rem 0.45rem 0;
      vertical-align: top;
      border-top: 1px solid var(--rule);
      font-size: 0.75rem;
    }
    .tl-table tr:first-child td { border-top: none; }
    .tl-col-date {
      width: 110px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--faint);
      white-space: nowrap;
    }
    .tl-col-dot { width: 20px; }
    .tl-dot-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 0.3rem;
    }
    .tl-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-col-action { width: 80px; }
    .act-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
    }
    .act-v {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--faint);
    }
    .tl-col-changes { }

    /* Before/after diff */
    .diff-block { display: flex; flex-direction: column; gap: 0.3rem; }
    .diff-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0.5rem;
      align-items: start;
    }
    .diff-field {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--faint);
      padding-top: 0.15rem;
      line-height: 1.3;
    }
    .diff-values {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.3rem;
      font-family: var(--mono);
      font-size: 0.67rem;
    }
    .diff-before {
      background: var(--red-bg);
      color: #991b1b;
      padding: 0.1rem 0.35rem;
      text-decoration: line-through;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
    }
    .diff-arrow { color: var(--rule-dk); font-size: 0.6rem; }
    .diff-after {
      background: var(--green-bg);
      color: #166534;
      padding: 0.1rem 0.35rem;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
    }
    .diff-new {
      background: var(--blue-bg);
      color: #1e40af;
      padding: 0.1rem 0.35rem;
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
    }
    .tl-version { display: inline; }

    /* ── Pagination ──────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 0;
      margin-top: 1.5rem;
    }
    .page-btn {
      border: 1px solid var(--rule);
      background: var(--white);
      padding: 0.4rem 0.75rem;
      font-size: 0.72rem;
      color: var(--sub);
      cursor: pointer;
      margin-left: -1px;
      font-variant-numeric: tabular-nums;
    }
    .page-btn:first-child { margin-left: 0; }
    .page-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); z-index: 1; }
    .page-btn:hover:not(.active):not(:disabled) { background: var(--off); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }

    .loading-state, .error-state, .empty-state {
      padding: 2.5rem 0;
      font-size: 0.8rem;
      color: var(--faint);
    }
    .error-state { color: var(--red); }

    @media (max-width: 640px) {
      .topbar-stats { flex-wrap: wrap; }
      .tstat { padding: 0.6rem 1rem; }
      .diff-row { grid-template-columns: 90px 1fr; }
      .tl-table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-brand">
      <span class="brand-name">Metadata Game Changers</span>
      <span class="brand-sub">sjyq.oozvia · prefix 10.60950</span>
    </div>
    <div class="topbar-stats">
      <div class="tstat"><span class="tstat-n" id="stat-total">—</span><span class="tstat-l">Records</span></div>
      <div class="tstat"><span class="tstat-n" id="stat-types">—</span><span class="tstat-l">Types</span></div>
      <div class="tstat"><span class="tstat-n" id="stat-recent">—</span><span class="tstat-l">Latest year</span></div>
      <div class="tstat"><span class="tstat-n" id="stat-schema">—</span><span class="tstat-l">Schema</span></div>
    </div>
    <div class="topbar-links">
      <a href="https://commons.datacite.org/repositories/sjyq.oozvia" target="_blank">DataCite Commons ↗</a>
      <a href="https://metadatagamechangers.com" target="_blank">MGC ↗</a>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-inner">
    <span class="tb-label">Filter</span>
    <input class="tb-input" id="search-input" type="search" placeholder="title, creator, DOI…" />
    <select class="tb-select" id="type-filter"><option value="">All types</option></select>
    <select class="tb-select" id="year-filter"><option value="">All years</option></select>
    <div class="tb-sep"></div>
    <span class="tb-sort-label">Sort</span>
    <div class="sort-group">
      <button class="sort-opt active" id="sort-updated">Updated</button>
      <button class="sort-opt" id="sort-year">Year</button>
      <button class="sort-opt" id="sort-title">Title</button>
    </div>
  </div>
</div>

<!-- RECORDS -->
<div class="main">
  <div class="list-meta" id="list-meta">Loading…</div>
  <div id="doi-container"><div class="loading-state">Fetching records from DataCite…</div></div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
const CLIENT_ID = 'sjyq.oozvia';
const API_BASE  = 'https://api.datacite.org';
const PAGE_SIZE = 15;

let allDOIs     = [];
let filtered    = [];
let currentPage = 1;
let sortKey     = 'updated';
let expandedDOI = null;

async function fetchAllDOIs() {
  let results = [], cursor = 1, total = null;
  while (true) {
    const url = `${API_BASE}/dois?client-id=${CLIENT_ID}&page[size]=100&page[number]=${cursor}&sort=-updated`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const json = await res.json();
    if (total === null) total = json.meta?.total ?? 0;
    results = results.concat(json.data ?? []);
    if (results.length >= total || !(json.data?.length)) break;
    cursor++;
    if (cursor > 20) break;
  }
  return results;
}

async function fetchActivities(doiId) {
  try {
    const res = await fetch(`${API_BASE}/dois/${encodeURIComponent(doiId)}/activities`);
    if (!res.ok) throw new Error(`${res.status}`);
    return (await res.json()).data ?? [];
  } catch { return null; }
}

function populateFilters(dois) {
  const types = [...new Set(dois.map(d => d.attributes?.types?.resourceTypeGeneral).filter(Boolean))].sort();
  const years = [...new Set(dois.map(d => d.attributes?.publicationYear).filter(Boolean))].sort((a,b)=>b-a);
  const ts = document.getElementById('type-filter');
  types.forEach(t => { const o=document.createElement('option'); o.value=o.textContent=t; ts.appendChild(o); });
  const ys = document.getElementById('year-filter');
  years.forEach(y => { const o=document.createElement('option'); o.value=o.textContent=y; ys.appendChild(o); });
}

function updateStats(dois) {
  document.getElementById('stat-total').textContent = dois.length;
  document.getElementById('stat-types').textContent = new Set(dois.map(d=>d.attributes?.types?.resourceTypeGeneral).filter(Boolean)).size;
  const years = dois.map(d=>d.attributes?.publicationYear).filter(Boolean);
  document.getElementById('stat-recent').textContent = years.length ? Math.max(...years) : '—';
  const schemas = [...new Set(dois.map(d=>d.attributes?.schemaVersion?.replace('http://datacite.org/schema/kernel-','v')??'').filter(Boolean))];
  document.getElementById('stat-schema').textContent = schemas.length===1?schemas[0]:(schemas.length?schemas.join(', '):'—');
}

function applyFiltersAndRender() {
  const q    = document.getElementById('search-input').value.toLowerCase();
  const type = document.getElementById('type-filter').value;
  const year = document.getElementById('year-filter').value;
  filtered = allDOIs.filter(d => {
    const a = d.attributes ?? {};
    const title = a.titles?.[0]?.title ?? '';
    const creators = (a.creators??[]).map(c=>c.name).join(' ');
    const doi = d.id ?? '';
    return (!q||[title,creators,doi].join(' ').toLowerCase().includes(q))
        && (!type||a.types?.resourceTypeGeneral===type)
        && (!year||String(a.publicationYear)===year);
  });
  filtered.sort((a,b)=>{
    if (sortKey==='updated') return new Date(b.attributes?.updated??0)-new Date(a.attributes?.updated??0);
    if (sortKey==='year')    return (b.attributes?.publicationYear??0)-(a.attributes?.publicationYear??0);
    if (sortKey==='title')   return (a.attributes?.titles?.[0]?.title??'').localeCompare(b.attributes?.titles?.[0]?.title??'');
    return 0;
  });
  currentPage = 1;
  renderPage();
}

function renderPage() {
  const total = filtered.length;
  const pages = Math.ceil(total/PAGE_SIZE);
  const start = (currentPage-1)*PAGE_SIZE;
  const slice = filtered.slice(start, start+PAGE_SIZE);
  document.getElementById('list-meta').textContent =
    total ? `${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total} records` : '0 records';
  const container = document.getElementById('doi-container');
  if (!total) { container.innerHTML='<div class="empty-state">No records match.</div>'; document.getElementById('pagination').innerHTML=''; return; }
  container.innerHTML = slice.map(renderRow).join('');
  container.querySelectorAll('.toggle-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{ e.stopPropagation(); toggleActivity(btn.dataset.doi); });
  });
  renderPagination(pages);
}

function renderRow(d) {
  const a  = d.attributes ?? {};
  const doi = d.id ?? '';
  const title    = a.titles?.[0]?.title ?? '(Untitled)';
  const creators = (a.creators??[]).map(c=>c.name).join(', ') || '—';
  const year   = a.publicationYear ?? '';
  const typeG  = a.types?.resourceTypeGeneral ?? '';
  const typeS  = a.types?.resourceType ?? '';
  const schema = (a.schemaVersion??'').replace('http://datacite.org/schema/kernel-','v');
  const updated = a.updated ? fmtDate(a.updated) : '';
  const views = a.viewCount??0, cites = a.citationCount??0, dl = a.downloadCount??0;
  return `
  <div class="doi-row" id="card-${sanitizeId(doi)}">
    <div class="doi-row-main">
      <div>
        <div class="doi-title">${escHtml(title)}</div>
        <div class="doi-creators">${escHtml(creators)}</div>
        <div class="doi-meta-line">
          ${typeG?`<span class="doi-badge badge-type">${escHtml(typeG)}</span>`:''}
          ${typeS&&typeS!==typeG?`<span class="doi-badge badge-type" style="opacity:.7">${escHtml(typeS)}</span>`:''}
          ${year?`<span class="doi-badge badge-year">${year}</span>`:''}
          ${schema?`<span class="doi-badge badge-schema">${escHtml(schema)}</span>`:''}
        </div>
        <div class="doi-identifier">
          <a href="https://doi.org/${doi}" target="_blank">${escHtml(doi)}</a>
          ${updated?`<span style="margin-left:.8rem">updated ${updated}</span>`:''}
        </div>
        <div class="doi-counts">
          <span>${views} views</span><span>${cites} citations</span><span>${dl} downloads</span>
        </div>
      </div>
      <button class="toggle-btn" data-doi="${escAttr(doi)}">history</button>
    </div>
    <div class="act-panel" id="act-${sanitizeId(doi)}">
      <div style="padding:0.5rem 0">Loading…</div>
    </div>
  </div>`;
}

async function toggleActivity(doiId) {
  const safeId = sanitizeId(doiId);
  const panel  = document.getElementById(`act-${safeId}`);
  const btn    = document.querySelector(`.toggle-btn[data-doi="${escAttr(doiId)}"]`);
  if (!panel||!btn) return;
  const isOpen = panel.classList.contains('open');
  if (isOpen) { panel.classList.remove('open'); btn.classList.remove('open'); btn.textContent='history'; return; }
  panel.classList.add('open'); btn.classList.add('open'); btn.textContent='close';
  if (panel.dataset.loaded) return;
  panel.dataset.loaded='true';
  const activities = await fetchActivities(doiId);
  renderActivities(panel, doiId, activities);
}

function renderActivities(panel, doiId, activities) {
  if (activities===null) { panel.innerHTML=`<div class="error-state">Could not load activities.</div>`; return; }
  if (!activities.length) { panel.innerHTML=`<div class="empty-state">No activity records.</div>`; return; }

  const n = activities.length;
  const chrono = [...activities].reverse();

  const pulse = chrono.map((a,i)=>{
    const action = (a.attributes?.action??'').toLowerCase();
    const color  = actionColor(action);
    const h = Math.max(6, Math.round(32*(i+1)/n));
    const ts = a.attributes?.['prov:generatedAtTime'] ?? '';
    return `<div class="pulse-seg" style="height:${h}px;background:${color}" title="${escAttr(action+(ts?' · '+fmtDate(ts):''))}"></div>`;
  }).join('');

  const rows = activities.map((a,i)=>{
    const attrs  = a.attributes ?? {};
    const action = attrs.action ?? 'update';
    const ts     = attrs['prov:generatedAtTime'] ?? attrs.createdAt ?? '';
    const version = attrs.version ?? '';
    const dotColor = actionColor(action);
    const changesHtml = renderChangesDiff(attrs.changes, action);
    return `<tr>
      <td class="tl-col-date">${ts?fmtDate(ts):'—'}</td>
      <td class="tl-col-dot"><div class="tl-dot-wrap"><div class="tl-dot" style="background:${dotColor}"></div></div></td>
      <td class="tl-col-action">
        <div class="act-label" style="color:${dotColor}">${escHtml(capitalise(action))}</div>
        ${version?`<div class="act-v">v${version}</div>`:''}
      </td>
      <td class="tl-col-changes">${changesHtml}</td>
    </tr>`;
  }).join('');

  panel.innerHTML = `
    <div class="act-header">
      Activity · ${n} event${n!==1?'s':''}
      <a href="https://api.datacite.org/dois/${encodeURIComponent(doiId)}/activities" target="_blank">raw JSON ↗</a>
    </div>
    <div class="pulse-bar">${pulse}</div>
    <table class="tl-table"><tbody>${rows}</tbody></table>`;
}

// ── Action color ─────────────────────────────────────
function actionColor(action) {
  const a = (action??'').toLowerCase();
  if (a.includes('create'))   return '#16a34a';
  if (a.includes('publish'))  return '#d97706';
  if (a.includes('update'))   return '#2563eb';
  if (a.includes('hide'))     return '#6b7280';
  if (a.includes('register')) return '#7c3aed';
  return '#9ca3af';
}

// ── Field labels ─────────────────────────────────────
const FIELD_LABELS = {
  url:'URL', doi:'DOI', titles:'Titles', creators:'Creators',
  contributors:'Contributors', descriptions:'Descriptions', subjects:'Subjects',
  dates:'Dates', types:'Types', rights_list:'Rights / Licenses',
  related_identifiers:'Related IDs', funding_references:'Funding',
  geo_locations:'Geo Locations', publisher:'Publisher',
  publication_year:'Pub. Year', language:'Language',
  schema_version:'Schema', sizes:'Sizes', formats:'Formats',
  version_info:'Version', identifiers:'Identifiers', related_items:'Related Items'
};
function fieldLabel(k) { return FIELD_LABELS[k]??k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

function summariseValue(val) {
  if (val===null||val===undefined) return '—';
  if (typeof val==='string') return val.length>120?val.slice(0,120)+'…':val;
  if (typeof val==='number'||typeof val==='boolean') return String(val);
  if (Array.isArray(val)) { if(!val.length) return '(empty)'; return val.map(summariseValue).join(', ').slice(0,200); }
  if (typeof val==='object') {
    const pick = val.title??val.name??val.rights??val.relatedIdentifier
               ??val.dateType??val.resourceTypeGeneral??val.resourceType
               ??val.rightsIdentifier??val.relationType??null;
    if (pick) return summariseValue(pick);
    return JSON.stringify(val).slice(0,120);
  }
  return String(val);
}

function renderChangesDiff(changes, action) {
  if (!changes||typeof changes!=='object') return '';
  const isCreate = (action??'').toLowerCase().includes('create');
  const SKIP = new Set(['regenerate','only_validate','should_validate','aasm_state','content_url','landing_page','container','reason','source']);
  const rows = [];
  for (const [field, val] of Object.entries(changes)) {
    if (SKIP.has(field)) continue;
    const label = escHtml(fieldLabel(field));
    if (isCreate) {
      const s = summariseValue(val);
      if (!s||s==='—'||s==='(empty)') continue;
      rows.push(`<div class="diff-row"><span class="diff-field">${label}</span><div class="diff-values"><span class="diff-new" title="${escAttr(s)}">${escHtml(s)}</span></div></div>`);
    } else if (Array.isArray(val)&&val.length===2) {
      const b = summariseValue(val[0]), a2 = summariseValue(val[1]);
      if (b===a2) continue;
      rows.push(`<div class="diff-row"><span class="diff-field">${label}</span><div class="diff-values"><span class="diff-before" title="${escAttr(b)}">${escHtml(b)}</span><span class="diff-arrow">→</span><span class="diff-after" title="${escAttr(a2)}">${escHtml(a2)}</span></div></div>`);
    } else {
      const s = summariseValue(val);
      if (!s||s==='—') continue;
      rows.push(`<div class="diff-row"><span class="diff-field">${label}</span><div class="diff-values"><span class="diff-new" title="${escAttr(s)}">${escHtml(s)}</span></div></div>`);
    }
  }
  if (!rows.length) return '';
  return `<div class="diff-block">${rows.join('')}</div>`;
}

// ── Helpers ───────────────────────────────────────────
function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }
  catch { return iso; }
}
function capitalise(s) { return s?s[0].toUpperCase()+s.slice(1):s; }
function sanitizeId(s) { return s.replace(/[^a-zA-Z0-9-_]/g,'-'); }
function escHtml(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return escHtml(s); }

// ── Pagination ────────────────────────────────────────
function renderPagination(pages) {
  const pag = document.getElementById('pagination');
  if (pages<=1) { pag.innerHTML=''; return; }
  let html = `<button class="page-btn" id="prev-btn"${currentPage===1?' disabled':''}>← prev</button>`;
  for (let p=1;p<=pages;p++) html+=`<button class="page-btn${p===currentPage?' active':''}" data-page="${p}">${p}</button>`;
  html += `<button class="page-btn" id="next-btn"${currentPage===pages?' disabled':''}>next →</button>`;
  pag.innerHTML = html;
  pag.querySelector('#prev-btn')?.addEventListener('click',()=>{currentPage--;renderPage();window.scrollTo(0,0);});
  pag.querySelector('#next-btn')?.addEventListener('click',()=>{currentPage++;renderPage();window.scrollTo(0,0);});
  pag.querySelectorAll('[data-page]').forEach(b=>b.addEventListener('click',()=>{currentPage=Number(b.dataset.page);renderPage();window.scrollTo(0,0);}));
}

// ── Sort buttons ──────────────────────────────────────
['sort-updated','sort-year','sort-title'].forEach(id=>{
  document.getElementById(id).addEventListener('click',()=>{
    document.querySelectorAll('.sort-opt').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    sortKey=id.replace('sort-','');
    applyFiltersAndRender();
  });
});

let searchTimer;
document.getElementById('search-input').addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(applyFiltersAndRender,280);});
document.getElementById('type-filter').addEventListener('change',applyFiltersAndRender);
document.getElementById('year-filter').addEventListener('change',applyFiltersAndRender);

(async()=>{
  try {
    allDOIs = await fetchAllDOIs();
    populateFilters(allDOIs);
    updateStats(allDOIs);
    applyFiltersAndRender();
  } catch(err) {
    document.getElementById('doi-container').innerHTML=`<div class="error-state">Failed to load: ${escHtml(err.message)}</div>`;
    document.getElementById('list-meta').textContent='Error';
  }
})();
</script>
